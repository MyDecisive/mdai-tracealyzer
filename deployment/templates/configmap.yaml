apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mdai-tracealyzer.fullname" . }}-config
  labels:
    {{- include "mdai-tracealyzer.labels" . | nindent 4 }}
data:
  config.yaml: |
    ingestion:
      otlp_grpc_endpoint: {{ .Values.config.ingestion.otlpGrpcEndpoint | quote }}
      otlp_http_endpoint: {{ .Values.config.ingestion.otlpHttpEndpoint | quote }}
    buffer:
      valkey_db: {{ .Values.config.buffer.valkeyDb }}
      quiet_period: {{ .Values.config.buffer.quietPeriod | quote }}
      max_ttl: {{ .Values.config.buffer.maxTtl | quote }}
      sweep_interval: {{ .Values.config.buffer.sweepInterval | quote }}
    emitter:
      greptimedb_endpoint: {{ .Values.config.emitter.greptimedbEndpoint | quote }}
      greptimedb_database: {{ .Values.config.emitter.greptimedbDatabase | quote }}
      table_name: {{ .Values.config.emitter.tableName | quote }}
      timeout: {{ .Values.config.emitter.timeout | quote }}
      max_retries: {{ .Values.config.emitter.maxRetries }}
      initial_backoff: {{ .Values.config.emitter.initialBackoff | quote }}
    service:
      log_level: {{ .Values.config.service.logLevel | quote }}
      metrics_endpoint: {{ .Values.config.service.metricsEndpoint | quote }}
      shutdown_grace: {{ .Values.config.service.shutdownGrace | quote }}
