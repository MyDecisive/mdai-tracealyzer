# Overrides for `make deploy-local` against a kind cluster.
# Used only by the local development flow; not shipped to downstream installs.

image:
  pullPolicy: Never

config:
  emitter:
    greptimedbEndpoint: "mdai-greptimedb.mdai.svc.cluster.local:4001"
    greptimedbSqlEndpoint: "mdai-greptimedb.mdai.svc.cluster.local:4003"
    greptimedbDatabase: "public"
  service:
    logLevel: debug

serviceMonitor:
  enabled: false

secrets:
  greptimedbAuth:
    existingSecret: greptimedb-users-auth
    key: passwd
