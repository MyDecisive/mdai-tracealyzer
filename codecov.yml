coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: 80%
        threshold: 1%

ignore:
  - "cmd/**"
  - "mocks/**"
  - "**/*_mock.go"
  - "test-stand/**"

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true
