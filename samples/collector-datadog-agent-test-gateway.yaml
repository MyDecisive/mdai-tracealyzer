apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: datadog-agent-test-gateway
  labels:
    app: datadog-agent-test-gateway
    app.kubernetes.io/instance: datadog-agent-test-gateway
spec:
  image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.147.0
  # Preserve full 128-bit trace IDs end-to-end. Without this gate the datadog
  # receiver zeroes the upper 64 bits of trace_id and carries them in the
  # _dd.p.tid attribute; tracealyzer sees truncated IDs.
  args:
    feature-gates: receiver.datadogreceiver.Enable128BitTraceID
  env:
    - name: TRACEALYZER_OTLP_GRPC_ENDPOINT
      value: "mdai-tracealyzer:4317"
  ports:
    - name: datadog
      port: 8126
      protocol: TCP
      targetPort: 8126
  config:
    receivers:
      datadog:
        endpoint: "0.0.0.0:8126"

    processors:
      batch:
        send_batch_size: 1000
        timeout: 10s

    exporters:
      otlp_grpc/tracealyzer:
        endpoint: ${env:TRACEALYZER_OTLP_GRPC_ENDPOINT}
        tls:
          insecure: true

      debug:
        verbosity: detailed

    service:
      pipelines:
        traces/tracealyzer:
          receivers: [datadog]
#          processors: [batch]
          exporters: [otlp_grpc/tracealyzer,debug]
