# Only a single replica is supported without trace-ID-affine ingest.
# Running replicas > 1 requires an upstream OTel Collector using
# loadbalancingexporter with routing_key: traceID pointing at this Service,
# otherwise spans for the same trace land on different pods and produce
# partial, duplicated topology metrics.
replicaCount: 1

image:
  repository: public.ecr.aws/decisiveai/mdai-tracealyzer
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  ports:
    otlpGrpc: 4317
    otlpHttp: 4318
    metrics: 9090

config:
  ingestion:
    otlpGrpcEndpoint: "0.0.0.0:4317"
    otlpHttpEndpoint: "0.0.0.0:4318"
  buffer:
    valkeyAddr: "valkey:6379"
    valkeyDb: 0
    quietPeriod: "60s"
    maxTtl: "10m"
    sweepInterval: "5s"
  emitter:
    greptimedbEndpoint: "greptimedb:4001"
    greptimedbDatabase: "public"
    tableName: "trace_topology"
    timeout: "10s"
    maxRetries: 3
    initialBackoff: "1s"
  service:
    logLevel: "info"
    metricsEndpoint: "0.0.0.0:9090"
    shutdownGrace: "30s"

secrets:
  valkeyPassword:
    existingSecret: ""
    key: VALKEY_PASSWORD
  greptimedbAuth:
    existingSecret: ""
    key: GREPTIMEDB_AUTH

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
terminationGracePeriodSeconds: 30
