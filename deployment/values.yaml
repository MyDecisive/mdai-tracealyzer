# Only a single replica is supported without trace-ID-affine ingest.
# Running replicas > 1 requires an upstream OTel Collector using
# loadbalancingexporter with routing_key: traceID pointing at this Service,
# otherwise spans for the same trace land on different pods and produce
# partial, duplicated topology metrics.
replicaCount: 1

image:
  repository: public.ecr.aws/decisiveai/mdai-tracealyzer
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  ports:
    otlpGrpc: 4317
    otlpHttp: 4318
    metrics: 9090

serviceMonitor:
  enabled: false
  namespace: ""
  labels: {}
  path: /metrics
  interval: 30s
  scrapeTimeout: 10s
  honorLabels: false
  relabelings: []
  metricRelabelings: []

config:
  ingestion:
    otlpGrpcEndpoint: "0.0.0.0:4317"
    otlpHttpEndpoint: "0.0.0.0:4318"
  buffer:
    valkeyDb: 0
    quietPeriod: "60s"
    maxTtl: "10m"
    sweepInterval: "5s"
    # sweepWorkerPoolSize: 4  # defaults to runtime.NumCPU() when unset
  emitter:
    greptimedbEndpoint: "mdai-greptimedb.mdai.svc.cluster.local:4001"
    greptimedbSqlEndpoint: "mdai-greptimedb.mdai.svc.cluster.local:4003"
    greptimedbDatabase: "public"
    tableTtl: "14d"
    timeout: "10s"
    maxRetries: 5
    initialBackoff: "10s"
    batchSize: 100
    flushInterval: "1s"
    queueCapacity: 1000
  service:
    logLevel: "info"
    metricsEndpoint: "0.0.0.0:9090"
    shutdownGrace: "30s"

secrets:
  valkeySecretName: "valkey-secret"
  greptimedbAuth:
    existingSecret: "greptimedb-users-auth"
    key: passwd

migrationJob:
  enabled: true
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  annotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
terminationGracePeriodSeconds: 30
