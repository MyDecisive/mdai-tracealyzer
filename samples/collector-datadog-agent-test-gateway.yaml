apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: datadog-agent-test-gateway
  labels:
    app: datadog-agent-test-gateway
    app.kubernetes.io/instance: datadog-agent-test-gateway
spec:
  image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.147.0
  # Preserve full 128-bit trace IDs end-to-end. Without this gate the datadog
  # receiver zeroes the upper 64 bits of trace_id and carries them in the
  # _dd.p.tid attribute; tracealyzer sees truncated IDs.
  args:
    feature-gates: receiver.datadogreceiver.Enable128BitTraceID
  env:
    - name: LOG_SAMPLING_PCT
      value: "100"
    - name: TRACE_SAMPLING_PCT
      value: "100"
  ports:
    - name: datadog
      port: 8126
      protocol: TCP
      targetPort: 8126
  config:
    receivers:
      datadog:
        endpoint: "0.0.0.0:8126"

    processors:
      probabilistic_sampler/logs:
        mode: proportional
        sampling_percentage: ${env:LOG_SAMPLING_PCT}
        fail_closed: false
        attribute_source: traceID
        from_attribute: log_id

      probabilistic_sampler/traces:
        mode: proportional
        sampling_percentage: ${env:TRACE_SAMPLING_PCT}

      batch:
        send_batch_size: 1000
        timeout: 10s

    exporters:
      debug:
        verbosity: detailed

    service:
      pipelines:
#        logs:
#          receivers: [datadog]
#          processors: [probabilistic_sampler/logs, batch]
#          exporters: [debug]
        traces:
          receivers: [datadog]
          processors: [probabilistic_sampler/traces, batch]
          exporters: [debug]
